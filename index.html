<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PC THIENE - APP PERSONALE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="logosala.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-auth-compat.js"></script>

    <script src="config.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #010409 !important; color: #e2e8f0 !important; overflow: hidden; }
        .swal2-container { z-index: 9999999 !important; }
        #map { height: 100%; width: 100%; background: #242a34; z-index: 10; }
        .mili-grid { background-image: linear-gradient(rgba(59,130,246,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.1) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 15; }
        
        #app-container { display: none; height: 100%; width: 100%; flex-direction: column; }
        .tab-content { display: none; animation: fadeIn 0.3s ease-out; }
        #tab-tattico.active-tab { display: flex; }
        #tab-eventi.active-tab { display: block; }
        #tab-personale.active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-status { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; border-bottom-width: 4px; height: 45px; font-weight: 700; text-transform: uppercase; font-size: 9px; cursor: pointer; transition: 0.2s;}
        .btn-status span { font-size: 16px; margin-bottom: 2px; }
        .btn-status:active { transform: scale(0.95); }
        .btn-media { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; background: #1e293b; border: 1px solid #334155; height: 45px; cursor: pointer; transition: 0.2s;}
        .btn-media:active { transform: scale(0.95); background: #334155;}

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="h-screen w-screen relative selection:bg-blue-500/30">

    <div id="loading-screen" class="absolute inset-0 z-[999999] bg-[#010409] flex flex-col items-center justify-center transition-opacity">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
        <div class="text-blue-400 font-black tracking-widest uppercase animate-pulse">Avvio Sistemi...</div>
    </div>

    <div id="login-screen" class="absolute inset-0 z-[99999] bg-[#010409] hidden flex-col items-center justify-center p-6">
        <img src="logosala.png" alt="Logo" class="h-28 w-auto mb-6 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]">
        <h1 class="text-2xl font-black text-white uppercase tracking-widest mb-8 text-center leading-tight">Area<br><span class="text-blue-500">Personale</span></h1>
        <div class="w-full max-w-sm flex flex-col gap-4">
            <div><label class="text-[10px] text-slate-400 font-bold uppercase ml-1">Email (Es. mario.rossi@...)</label><input type="email" id="login-email" class="w-full bg-slate-800 border border-slate-600 rounded-xl p-3 text-white focus:border-blue-500 outline-none" placeholder="mario.rossi@ceitimpianti.com"></div>
            <div><label class="text-[10px] text-slate-400 font-bold uppercase ml-1">Password</label><input type="password" id="login-password" class="w-full bg-slate-800 border border-slate-600 rounded-xl p-3 text-white focus:border-blue-500 outline-none" placeholder="••••••"></div>
            <button onclick="eseguiLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black uppercase py-3 rounded-xl mt-4 shadow-lg transition-all active:scale-95">🔐 ACCEDI</button>
            <button onclick="recuperaPassword()" class="text-slate-500 text-xs underline mt-2">Password dimenticata?</button>
        </div>
    </div>

    <div id="app-container">
        
        <div id="tab-tattico" class="tab-content active-tab h-full w-full relative flex-col pb-20">
            <header class="px-3 py-2 bg-slate-900 border-b border-slate-700 flex justify-between items-center z-[100] shadow-lg">
                <div class="flex items-center gap-3">
                    <img src="logosala.png" class="h-10 w-auto">
                    <div class="flex flex-col"><h1 class="text-sm font-black text-white uppercase leading-none">Terminale Operativo</h1><span id="tattico-nome" class="text-[10px] text-blue-400 font-bold uppercase">...</span></div>
                </div>
                <div class="flex flex-col items-end">
                    <div id="current-status" class="text-[9px] font-black text-white uppercase tracking-widest bg-emerald-600 px-2 py-0.5 rounded shadow mb-1">ATTESA</div>
                    <div class="flex gap-1">
                        <div id="live-badge" class="hidden text-[7px] bg-red-500 text-white px-1.5 rounded font-bold uppercase animate-pulse shadow">LIVE</div>
                        <div id="gps-badge" class="inline-block text-[7px] bg-slate-600 text-white px-1.5 rounded font-bold uppercase shadow">GPS OFF</div>
                    </div>
                </div>
            </header>

            <div class="flex-1 w-full relative z-0">
                <div id="map" class="absolute inset-0"></div>
                <div class="absolute inset-0 mili-grid"></div>
                
                <div class="absolute top-2 left-2 right-2 z-[1000]"><div id="target-banner"></div></div>
                
                <div class="absolute bottom-2 right-2 z-[1000] flex flex-col gap-2">
                    <button onclick="window.centraMappaSuGPS()" class="bg-slate-800/90 text-white h-10 w-10 rounded-xl border border-slate-600 shadow-lg text-xl active:scale-95">📍</button>
                    <button onclick="window.toggleGPS()" id="btn-toggle-gps" class="bg-slate-800/90 text-slate-400 h-10 w-10 rounded-xl border border-slate-600 shadow-lg text-lg relative active:scale-95">📡<span id="gps-status-indicator" class="absolute top-1 right-1 w-2 h-2 bg-slate-500 rounded-full"></span></button>
                </div>
            </div>

            <div class="shrink-0 bg-slate-900 border-t border-slate-700 p-2 flex flex-col gap-2 z-[100]">
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="window.askStatus('Sede', '🏠')" class="btn-status bg-emerald-600 border-emerald-800 text-white"><span>🏠</span> Sede</button>
                    <button onclick="window.askStatus('Uscita', '🚚')" class="btn-status bg-amber-500 border-amber-700 text-slate-900"><span>🚚</span> Uscita</button>
                    <button onclick="window.askStatus('Intervento', '🚨')" class="btn-status bg-red-600 border-red-800 text-white"><span>🚨</span> Sul Posto</button>
                </div>
                
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="document.getElementById('file-foto').click()" class="btn-media text-white"><span>📷</span><span class="text-[8px] font-bold">FOTO</span></button>
                    <button onclick="window.openGPSPanel()" class="btn-media text-emerald-400"><span>⚙️</span><span class="text-[8px] font-bold">GPS / MAPPA</span></button>
                    <input type="file" id="file-foto" accept="image/*" capture="camera" class="hidden" onchange="window.inviaFoto(this.files[0])">
                    
                    <div class="flex items-center bg-slate-800 border border-slate-600 rounded-lg p-1 col-span-1">
                         <input type="text" id="msg-input" class="w-full bg-transparent px-1 text-[10px] text-white focus:outline-none" placeholder="Msg Sala...">
                         <button onclick="window.askFreeMsg()" class="bg-blue-600 text-white px-2 py-1 rounded font-black shadow-lg active:scale-95">➤</button>
                    </div>
                </div>
                
                <div id="last-msg-banner" class="hidden w-full bg-slate-800/80 rounded-lg p-2 border border-slate-600 flex-col justify-center">
                    <div class="flex justify-between items-center border-b border-white/10 pb-1 mb-1">
                        <span id="last-msg-title" class="text-[9px] font-bold text-blue-400 uppercase">🎧 DALLA SALA</span>
                        <span id="last-msg-time" class="text-[9px] font-mono text-slate-400">--:--</span>
                    </div>
                    <span id="last-msg-text" class="text-[11px] text-white font-medium italic"></span>
                </div>
            </div>
        </div>

        <div id="tab-eventi" class="tab-content hidden h-full w-full bg-[#010409] overflow-y-auto pb-28 p-4">
            <div class="flex items-center gap-3 mb-6 mt-2">
                <span class="text-3xl">📅</span>
                <div><h2 class="text-xl font-black text-white uppercase">Eventi / Turni</h2><p class="text-[10px] text-blue-400 font-bold uppercase">Inserisci la tua disponibilità</p></div>
            </div>
            <div id="lista-eventi-app" class="flex flex-col gap-3"></div>
        </div>

        <div id="tab-personale" class="tab-content hidden h-full w-full bg-[#010409] overflow-y-auto pb-28 p-4">
            <div class="flex items-center justify-between mb-4 mt-2">
                <div class="flex items-center gap-3"><span class="text-3xl">🪪</span><h2 class="text-xl font-black text-white uppercase">Profilo</h2></div>
                <button onclick="esciDallApp()" class="bg-red-900/50 text-red-400 text-[10px] font-bold uppercase px-4 py-2 rounded-lg border border-red-800 shadow active:scale-95">ESCI</button>
            </div>
            
            <div class="bg-slate-800/80 border border-slate-700 rounded-2xl p-5 mb-4 shadow-lg">
                <div class="flex justify-between items-start mb-2">
                    <div id="profilo-nome" class="text-xl text-white font-black uppercase leading-none">...</div>
                    <div id="profilo-sangue" class="bg-red-900/30 text-red-400 border border-red-800/50 px-2 py-1 rounded text-[10px] font-black uppercase shadow">N/D</div>
                </div>
                <div id="profilo-matricola" class="text-xs text-blue-400 font-mono font-bold">MATRICOLA: N/D</div>
                
                <div class="grid grid-cols-2 gap-2 mt-4 pt-4 border-t border-slate-700">
                    <div><div class="text-[9px] text-slate-500 uppercase font-bold">Gruppo</div><div id="profilo-gruppo" class="text-xs text-white font-bold uppercase">...</div></div>
                    <div><div class="text-[9px] text-slate-500 uppercase font-bold">Telefono</div><div id="profilo-tel" class="text-xs text-white font-mono">...</div></div>
                </div>
                
                <div class="mt-3 pt-3 border-t border-slate-700">
                    <div class="text-[9px] text-slate-500 uppercase font-bold mb-1">Patenti e Specialità</div>
                    <div id="profilo-spec" class="flex flex-wrap gap-1">...</div>
                </div>
                
                <button onclick="cambiaPasswordAuth()" class="w-full mt-4 bg-slate-700 hover:bg-slate-600 border border-slate-500 text-white text-[10px] font-bold uppercase py-2 rounded-lg shadow active:scale-95">
                    🔑 CAMBIA PASSWORD
                </button>
            </div>

            <div class="bg-slate-800/80 border border-slate-700 rounded-2xl p-4 mb-4 shadow-lg">
                <div class="text-[10px] text-slate-400 uppercase font-bold mb-3 flex items-center gap-2"><span>🎒</span> I MIEI D.P.I. CONSEGNATI</div>
                <div id="lista-dotazioni" class="flex flex-col gap-2"></div>
            </div>

            <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-4 shadow-lg">
                <div class="text-[10px] text-slate-400 uppercase font-bold mb-2 flex items-center justify-between">
                    <div class="flex items-center gap-2"><span>📝</span> MEMORIA / APPUNTI</div>
                    <span id="memoria-status" class="text-[8px] text-emerald-500">Salvataggio Auto</span>
                </div>
                <textarea id="diario-personale" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-slate-300 focus:outline-none min-h-[100px] mb-2" placeholder="Note salvate localmente..."></textarea>
                <div class="flex gap-2">
                    <button onclick="salvaAppunti()" class="flex-1 bg-emerald-900/40 border border-emerald-700/50 text-emerald-400 text-[9px] font-bold uppercase py-2 rounded-lg active:scale-95">💾 SALVA</button>
                    <button onclick="svuotaAppunti()" class="flex-1 bg-red-900/40 border border-red-700/50 text-red-400 text-[9px] font-bold uppercase py-2 rounded-lg active:scale-95">🗑️ SVUOTA</button>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 w-full bg-slate-900/95 border-t border-slate-700 flex justify-around items-end pb-6 pt-3 px-2 z-[99999] shadow-2xl">
            <button onclick="window.switchAppTab('tab-tattico', this)" class="nav-btn active flex flex-col items-center gap-1 w-1/3 text-emerald-400 transition-all duration-300 transform scale-110">
                <span class="text-2xl icon-nav transition-all">🚨</span><span class="text-[10px] font-black uppercase">Tattico</span>
            </button>
            <button onclick="window.switchAppTab('tab-eventi', this)" class="nav-btn flex flex-col items-center gap-1 w-1/3 text-slate-500 transition-all duration-300">
                <span class="text-2xl opacity-70 icon-nav transition-all">📅</span><span class="text-[10px] font-bold uppercase">Eventi</span>
            </button>
            <button onclick="window.switchAppTab('tab-personale', this)" class="nav-btn flex flex-col items-center gap-1 w-1/3 text-slate-500 transition-all duration-300">
                <span class="text-2xl opacity-70 icon-nav transition-all">🪪</span><span class="text-[10px] font-bold uppercase">Profilo</span>
            </button>
        </div>
    </div>

    <script>
        let db, map = null, markerMe, isGpsActive = false, gpsTrackerId = null;
        window.currentUser = ''; window.myTeamId = ''; window.userEmailObj = '';
        window.gpsAutoEnabled = localStorage.getItem('app_gps_auto') !== 'false';
        window.liveTrackingEnabled = localStorage.getItem('app_live_track') === 'true';
        let idSalaAttivo = null; let viaAttiva = ""; let ultimaPos = { lat: null, lng: null };

        const initFirebase = setInterval(() => {
            if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
                clearInterval(initFirebase); db = firebase.database(); 
                
                firebase.auth().onAuthStateChanged(user => {
                    const loader = document.getElementById('loading-screen');
                    const loginUI = document.getElementById('login-screen');
                    
                    if (!user) {
                        loader.classList.add('hidden');
                        loginUI.classList.remove('hidden'); loginUI.classList.add('flex');
                        document.getElementById('app-container').style.display = 'none';
                    } else {
                        loginUI.classList.add('hidden'); loginUI.classList.remove('flex');
                        window.userEmailObj = user.email;
                        
                        // DECODIFICA EMAIL -> NOME
                        const expectedName = user.email.split('@')[0].replace('.', ' ').toUpperCase();
                        
                        db.ref('impostazioni/rubrica_volontari').once('value').then(snap => {
                            let trovato = null;
                            if(snap.exists()) {
                                snap.forEach(child => {
                                    if (child.val().nome && child.val().nome.toUpperCase() === expectedName) {
                                        trovato = child.val();
                                    }
                                });
                            }
                            
                            window.currentUser = trovato ? trovato.nome.toUpperCase() : expectedName;
                            window.myTeamId = window.currentUser; // Di default sei un operatore singolo
                            
                            // Espulsione Esterni
                            if (trovato && trovato.ruolo && String(trovato.ruolo).toUpperCase().includes('ESTERNO')) {
                                firebase.auth().signOut();
                                Swal.fire('ACCESSO NEGATO', 'App riservata ai volontari interni.', 'error');
                                return;
                            }

                            // Compila Grafica Profilo
                            document.getElementById('profilo-nome').innerText = window.currentUser;
                            document.getElementById('tattico-nome').innerText = "OP. SINGOLO";
                            document.getElementById('profilo-matricola').innerText = "MATRICOLA: " + (trovato ? (trovato.matricola || 'N/D') : 'N/D');
                            document.getElementById('profilo-sangue').innerText = trovato ? (trovato.sangue || 'NON NOTO') : 'NON NOTO';
                            document.getElementById('profilo-gruppo').innerText = trovato ? (trovato.gruppo || 'PC THIENE') : 'PC THIENE';
                            document.getElementById('profilo-tel').innerText = trovato ? (trovato.tel || 'N/D') : 'N/D';
                            
                            let specHtml = '';
                            if(trovato && trovato.patenti) trovato.patenti.forEach(p => specHtml += `<span class="bg-amber-900/30 text-amber-400 border border-amber-700 px-1.5 py-0.5 rounded text-[8px] font-bold">🚙 ${p}</span>`);
                            if(trovato && trovato.spec) trovato.spec.forEach(s => specHtml += `<span class="bg-blue-900/30 text-blue-400 border border-blue-700 px-1.5 py-0.5 rounded text-[8px] font-bold">${s}</span>`);
                            document.getElementById('profilo-spec').innerHTML = specHtml || '<span class="text-[9px] text-slate-500 italic">Nessuna registrazione</span>';

                            avviaInterfaccia();
                        });
                    }
                });
            }
        }, 100);

        function eseguiLogin() {
            const e = document.getElementById('login-email').value; const p = document.getElementById('login-password').value;
            if (!e || !p) { Swal.fire('Attenzione', 'Inserisci email e password', 'warning'); return; }
            Swal.fire({ title: 'Accesso...', didOpen: () => Swal.showLoading() });
            firebase.auth().signInWithEmailAndPassword(e, p).then(()=>Swal.close()).catch(err => Swal.fire('Errore', 'Credenziali errate', 'error'));
        }

        function esciDallApp() {
            Swal.fire({title: 'Disconnetti?', icon: 'warning', showCancelButton: true, confirmButtonText: 'SÌ, ESCI', background: '#0f172a', color: '#fff'}).then(r => {
                if(r.isConfirmed) firebase.auth().signOut().then(() => location.reload());
            });
        }
        
        function recuperaPassword() {
            const e = document.getElementById('login-email').value;
            if (!e) return Swal.fire('Email Mancante', 'Inserisci la tua email nel campo per resettare la password.', 'warning');
            firebase.auth().sendPasswordResetEmail(e).then(() => Swal.fire('Inviata!', 'Controlla la posta.', 'success')).catch(() => Swal.fire('Errore', 'Verifica l\'indirizzo.', 'error'));
        }

        function cambiaPasswordAuth() {
            Swal.fire({ title: 'Reset Password', text: `Invieremo un'email a ${window.userEmailObj}. Confermi?`, icon: 'question', showCancelButton: true, confirmButtonText: 'INVIA MAIL', background: '#0f172a', color: '#fff' }).then((res) => {
                if(res.isConfirmed) firebase.auth().sendPasswordResetEmail(window.userEmailObj).then(() => Swal.fire('Inviata!', 'Controlla la posta.', 'success'));
            });
        }

        function avviaInterfaccia() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('app-container').style.display = 'flex';

            // 1. MAPPA
            if (!map) {
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([45.707, 11.465], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
            setTimeout(() => { map.invalidateSize(); }, 500);
            updateGpsBadge();

            // 2. ASCOLTO ASSEGNAZIONE SQUADRA
            db.ref('anagrafica_squadre').on('value', snap => {
                let trovataSq = window.currentUser;
                if(snap.exists()) {
                    snap.forEach(child => {
                        const sq = child.val();
                        if (sq.attiva) {
                            const capo = (sq.capo || '').toUpperCase();
                            const nomi = (sq.nomi || '').toUpperCase().split(',').map(n=>n.trim());
                            if (capo === window.currentUser || nomi.includes(window.currentUser)) {
                                trovataSq = child.key;
                            }
                        }
                    });
                }
                window.myTeamId = trovataSq;
                document.getElementById('tattico-nome').innerText = window.myTeamId === window.currentUser ? "OP. SINGOLO" : "UNITÀ: " + window.myTeamId;
            });

            // 3. ASCOLTO BROGLIACCIO (Chat e Target legati a myTeamId)
            db.ref('brogliaccio').limitToLast(100).on('value', snap => {
                if(!snap.exists()) return;
                const logs = Object.entries(snap.val()).map(([id, val]) => ({ id, ...val })).reverse();
                
                const target = logs.find(l => l.dir === 'SA' && (l.squadra === window.myTeamId || l.squadra === window.currentUser) && l.m1 && l.m1.includes('📍') && l.id !== window.targetCompletato);
                const banner = document.getElementById('target-banner');

                if (target) {
                    idSalaAttivo = target.id; viaAttiva = target.m1.replace('📍', '').trim();
                    if (target.lat && target.lng) ultimaPos = { lat: target.lat, lng: target.lng };

                    if (target.stato === 'ATTESA') {
                        banner.innerHTML = `<div class="bg-red-900/90 rounded-xl p-3 border border-red-500 shadow-lg"><div class="flex items-center gap-2 mb-2"><span class="text-2xl animate-bounce">🚨</span><div class="flex flex-col"><span class="text-[9px] text-red-300 font-bold uppercase">NUOVO ORDINE</span><span class="text-xs text-white font-black">${viaAttiva}</span></div></div><button onclick="window.cRic()" class="w-full bg-red-600 py-2 rounded-lg font-black uppercase text-[10px] text-white active:scale-95">✅ CONFERMA RICEZIONE</button></div>`;
                    } else {
                        banner.innerHTML = `<div class="bg-blue-900/90 rounded-xl p-3 border border-blue-500 shadow-lg"><div class="flex items-center gap-2 mb-2"><span class="text-2xl">🚐</span><div class="flex flex-col"><span class="text-[9px] text-blue-300 font-bold uppercase">IN VIAGGIO VERSO:</span><span class="text-xs text-white font-black">${viaAttiva}</span></div></div><div class="flex gap-2"><button onclick="window.navig()" class="flex-1 bg-emerald-600 py-2 rounded-lg font-bold text-[10px] text-white active:scale-95">📍 NAVIGA</button><button onclick="window.cArr()" class="flex-1 bg-red-600 py-2 rounded-lg font-bold text-[10px] text-white border border-red-800 active:scale-95">🏁 SUL POSTO</button></div></div>`;
                    }
                } else { banner.innerHTML = ''; idSalaAttivo = null; }

                const myLogs = logs.filter(l => l.squadra === window.myTeamId || l.squadra === window.currentUser || l.squadra === 'COMUNICAZIONE GENERALE');
                let lastMsg = null;
                for (let l of myLogs) {
                    if (l.m1 && l.m1.includes('📍')) continue; 
                    if (l.squadra === 'COMUNICAZIONE GENERALE' || (l.dir === 'SA' && l.m1 !== '---')) { lastMsg = l; break; } 
                }
                const msgBanner = document.getElementById('last-msg-banner');
                if (lastMsg) {
                    msgBanner.style.display = 'flex';
                    document.getElementById('last-msg-time').innerText = lastMsg.ora;
                    document.getElementById('last-msg-text').innerText = `"${lastMsg.m1}"`;
                } else { msgBanner.style.display = 'none'; }
            });

            // 4. EVENTI CON CONFERMA
            db.ref('eventi').on('value', snap => {
                const contenitore = document.getElementById('lista-eventi-app');
                if (snap.exists()) {
                    let html = '';
                    snap.forEach(child => {
                        const e = child.val();
                        html += `
                        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 shadow-lg mb-3">
                            <h3 class="text-sm font-bold text-white uppercase">${e.titolo || 'Evento'}</h3>
                            <div class="text-[10px] text-slate-400 mt-1 mb-3">📍 ${e.luogo || 'Sede'} | 🕒 ${e.data || 'N/D'}</div>
                            <div class="flex gap-2">
                                <button onclick="window.rispondiEvento('${child.key}', 'PRESENTE')" class="flex-1 bg-slate-900 border border-emerald-500/30 text-emerald-400 py-2 rounded-xl text-[10px] font-bold uppercase active:scale-95">✅ Presente</button>
                                <button onclick="window.rispondiEvento('${child.key}', 'ASSENTE')" class="flex-1 bg-slate-900 border border-red-500/30 text-red-400 py-2 rounded-xl text-[10px] font-bold uppercase active:scale-95">❌ Assente</button>
                            </div>
                        </div>`;
                    });
                    contenitore.innerHTML = html;
                } else { contenitore.innerHTML = '<p class="text-center text-slate-500 text-xs py-10 uppercase font-bold tracking-widest">Nessun Evento</p>'; }
            });

            // 5. DOTAZIONI (DPI ESATTI)
            db.ref('dotazioni').on('value', snap => {
                const contenitore = document.getElementById('lista-dotazioni');
                if (snap.exists()) {
                    let html = ''; let trovatoQualcosa = false;
                    snap.forEach(child => {
                        const dot = child.val();
                        if (dot.assegnato_a && dot.assegnato_a.toUpperCase() === window.currentUser) {
                            trovatoQualcosa = true;
                            html += `<div class="flex justify-between items-center bg-slate-900 border border-slate-700 p-3 rounded-xl mb-1"><div class="flex flex-col"><span class="text-white font-bold text-[11px] uppercase">${dot.articolo || dot.nome || 'Materiale'}</span><span class="text-slate-400 text-[9px] uppercase">${dot.categoria || 'DPI'} ${dot.taglia ? '| Tg: '+dot.taglia : ''}</span></div><div class="bg-blue-900/40 text-blue-300 border border-blue-700/50 px-2 py-1 rounded text-[10px] font-black">Q.tà: ${dot.quantita || dot.qta || 1}</div></div>`;
                        }
                    });
                    contenitore.innerHTML = trovatoQualcosa ? html : '<p class="text-slate-500 text-xs text-center py-4 uppercase font-bold tracking-widest">Nessun D.P.I. Consegnato</p>';
                } else { contenitore.innerHTML = '<p class="text-slate-500 text-xs text-center py-4 uppercase font-bold tracking-widest">Magazzino Vuoto.</p>'; }
            });

            // Memoria Locale
            const diario = document.getElementById('diario-personale');
            diario.value = localStorage.getItem('diario_vol') || '';
            diario.addEventListener('input', () => { 
                localStorage.setItem('diario_vol', diario.value); document.getElementById('memoria-status').innerText = 'Salvato.';
                setTimeout(()=> document.getElementById('memoria-status').innerText = 'Salvataggio Automatico', 2000);
            });
        }

        window.switchAppTab = (tabId, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active-tab');
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('text-emerald-400', 'text-blue-400', 'text-purple-400', 'scale-110'); b.classList.add('text-slate-500'); });
            btn.classList.add('scale-110');
            if(tabId === 'tab-tattico') { btn.classList.add('text-emerald-400'); if(map) setTimeout(() => map.invalidateSize(), 300); } 
            else if(tabId === 'tab-eventi') btn.classList.add('text-blue-400'); 
            else if(tabId === 'tab-personale') btn.classList.add('text-purple-400');
        };

        window.salvaAppunti = () => { localStorage.setItem('diario_vol', document.getElementById('diario-personale').value); Swal.fire({icon: 'success', title: 'SALVATO', toast: true, position: 'bottom', timer: 2000, showConfirmButton: false, background: '#0f172a', color: '#fff'}); };
        window.svuotaAppunti = () => { Swal.fire({ title: 'SVUOTA MEMORIA?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#dc2626', background: '#0f172a', color: '#fff' }).then(r => { if(r.isConfirmed) { localStorage.removeItem('diario_vol'); document.getElementById('diario-personale').value = ''; Swal.fire({icon: 'success', title: 'Cancellato', toast: true, position: 'bottom', timer: 1500, showConfirmButton: false, background: '#0f172a', color: '#fff'}); } }); };

        // CONFERME OPERATIVE
        window.rispondiEvento = (id, risposta) => {
            Swal.fire({ title: 'Confermi?', text: `Segnarti come ${risposta}?`, icon: 'question', showCancelButton: true, confirmButtonText: 'SÌ', confirmButtonColor: risposta === 'PRESENTE' ? '#10b981' : '#ef4444', background: '#0f172a', color: '#fff' }).then((res) => {
                if(res.isConfirmed) { db.ref(`eventi/${id}/risposte/${window.currentUser}`).set(risposta).then(() => Swal.fire({title:'Salvato!', icon:'success', timer:1500, showConfirmButton:false, background: '#0f172a', color: '#fff'})); }
            });
        };

        window.askStatus = (stato, icon) => {
            Swal.fire({ title: `CONFERMI STATO?`, html: `<span class="text-4xl block mb-2">${icon}</span><b>${stato.toUpperCase()}</b>`, showCancelButton: true, confirmButtonText: 'INVIA', confirmButtonColor: '#2563eb', background: '#0f172a', color: '#fff' }).then((r) => {
                if(r.isConfirmed) {
                    document.getElementById('current-status').innerText = stato.toUpperCase();
                    if(window.myTeamId !== window.currentUser) db.ref(`anagrafica_squadre/${window.myTeamId}`).update({ stato: stato, ultimo_contatto: Date.now() });
                    else db.ref(`anagrafica_squadre/${window.currentUser}`).update({ stato: stato, capo: window.currentUser, ultimo_contatto: Date.now(), attiva: true });
                    inviaMessaggioBrogliaccio(`CAMBIO STATO: ${stato}`, { dir: 'SQ', stato: 'OK' });
                }
            });
        };

        window.askFreeMsg = () => {
            const txt = document.getElementById('msg-input').value.trim(); if(!txt) return;
            Swal.fire({ title: 'INVIARE MESSAGGIO?', text: `"${txt}"`, showCancelButton: true, confirmButtonText: 'INVIA', confirmButtonColor: '#2563eb', background: '#0f172a', color: '#fff' }).then(r => {
                if(r.isConfirmed) { inviaMessaggioBrogliaccio(txt, { dir: 'SQ', stato: 'OK' }); document.getElementById('msg-input').value = ''; }
            });
        };

        window.inviaFoto = (file) => {
            if(!file) return; const reader = new FileReader();
            reader.onload = (e) => { Swal.fire({ title: 'INVIARE FOTO?', html: `<img src="${e.target.result}" class="w-full rounded mt-2">`, showCancelButton: true, confirmButtonText: 'INVIA', confirmButtonColor: '#2563eb', background: '#0f172a', color: '#fff' }).then((r) => { if(r.isConfirmed) inviaMessaggioBrogliaccio("📷 FOTO INVIATA", { mediaUrl: e.target.result, mediaType: 'IMG', dir: 'SQ', stato: 'OK' }); }); };
            reader.readAsDataURL(file);
        };

        function inviaMessaggioBrogliaccio(testo, extraObj) {
            const ora = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            let p = { lat: '', lng: '' }; if(ultimaPos.lat) p = ultimaPos;
            db.ref('brogliaccio').push({ ora: ora, data: new Date().toLocaleDateString('it-IT'), squadra: window.myTeamId, utente: window.currentUser, m1: testo.toUpperCase(), ...p, ...extraObj }).then(() => Swal.fire({ title: 'Inviato in Sala!', icon: 'success', timer: 1000, showConfirmButton: false, background: '#0f172a', color: '#fff' }));
        }

        window.cRic = () => { if(idSalaAttivo) { db.ref(`brogliaccio/${idSalaAttivo}`).update({ stato: 'OK', m2: '✅ RICEVUTO', ora_risposta: new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }) }); db.ref(`anagrafica_squadre/${window.myTeamId}`).update({ stato: 'Trasferimento', ultimo_contatto: Date.now() }); } };
        window.cArr = () => { if(!idSalaAttivo) return; Swal.fire({ title: 'SUL POSTO?', showCancelButton: true, confirmButtonText: 'SÌ', confirmButtonColor: '#dc2626', background: '#0f172a', color: '#fff' }).then((r) => { if (r.isConfirmed) { window.targetCompletato = idSalaAttivo; db.ref(`anagrafica_squadre/${window.myTeamId}`).update({ stato: 'Intervento', ultimo_contatto: Date.now() }); inviaMessaggioBrogliaccio(`🏁 ARRIVATI: ${viaAttiva}`, { stato: 'ATTESA', dir: 'SQ' }); idSalaAttivo = null; } }); };
        window.navig = () => { if(ultimaPos.lat) window.open(`https://www.google.com/maps/dir/?api=1&destination=$${ultimaPos.lat},${ultimaPos.lng}`, '_blank'); };

        window.openGPSPanel = () => {
            Swal.fire({ title: 'MAPPA E GPS', html: `<div style="text-align: left; display: flex; flex-direction: column; gap: 10px; margin-top: 10px;"><div style="background: #1e293b; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;"><span style="font-size: 11px; font-weight: bold; color: white;">GPS nei Messaggi</span><label class="switch"><input type="checkbox" id="gps-toggle" ${window.gpsAutoEnabled ? 'checked' : ''} onchange="window.toggleGpsApp(this.checked)"><span class="slider"></span></label></div><div style="background: #1e293b; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;"><span style="font-size: 11px; font-weight: bold; color: #ef4444;">LIVE Tracking 🔴</span><label class="switch"><input type="checkbox" id="live-toggle" ${window.liveTrackingEnabled ? 'checked' : ''} onchange="window.toggleLiveTrack(this.checked)"><span class="slider"></span></label></div></div>`, showConfirmButton: true, confirmButtonText: 'CHIUDI', confirmButtonColor: '#475569', background: '#0f172a', color: '#fff' });
        };
        window.toggleGpsApp = (val) => { window.gpsAutoEnabled = val; localStorage.setItem('app_gps_auto', val); updateGpsBadge(); };
        window.toggleLiveTrack = (val) => { window.liveTrackingEnabled = val; localStorage.setItem('app_live_track', val); updateGpsBadge(); };

        function updateGpsBadge() {
            const badge = document.getElementById('gps-badge'); const live = document.getElementById('live-badge');
            if(window.gpsAutoEnabled) { badge.className = "inline-block text-[7px] bg-slate-600 text-white px-1.5 rounded font-bold uppercase shadow border border-slate-500"; badge.innerText = "GPS AUT"; } 
            else { badge.className = "inline-block text-[7px] bg-slate-800 text-slate-500 px-1.5 rounded font-bold uppercase shadow border border-slate-700"; badge.innerText = "GPS OFF"; }
            live.style.display = window.liveTrackingEnabled ? 'inline-block' : 'none';
        }

        window.toggleGPS = () => {
            const btn = document.getElementById('btn-toggle-gps'); const ind = document.getElementById('gps-status-indicator');
            if (isGpsActive) {
                if(gpsTrackerId) navigator.geolocation.clearWatch(gpsTrackerId); gpsTrackerId = null; isGpsActive = false;
                btn.classList.remove('border-emerald-500'); ind.className = 'absolute top-1 right-1 w-2 h-2 bg-slate-500 rounded-full';
            } else { 
                if (!navigator.geolocation) return; isGpsActive = true; 
                btn.classList.add('border-emerald-500'); ind.className = 'absolute top-1 right-1 w-2 h-2 bg-emerald-500 rounded-full animate-pulse';
                gpsTrackerId = navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude } = pos.coords; ultimaPos = { lat: latitude, lng: longitude };
                    if (!markerMe) { markerMe = L.marker([latitude, longitude], { icon: L.divIcon({ className: 'bg-transparent', html: '<div class="w-6 h-6 bg-blue-500 border-2 border-white rounded-full flex items-center justify-center text-[10px] font-black text-white">ME</div>', iconSize: [24,24] }) }).addTo(map); map.setView([latitude, longitude], 16); } 
                    else { markerMe.setLatLng([latitude, longitude]); }
                    if(window.liveTrackingEnabled) db.ref(`anagrafica_squadre/${window.myTeamId}`).update({ lat: latitude.toFixed(6), lng: longitude.toFixed(6), ultimo_contatto: Date.now() });
                }, null, { enableHighAccuracy: true });
            }
        };
        window.centraMappaSuGPS = () => { if(markerMe && map) map.setView(markerMe.getLatLng(), 17); };

    </script>
</body>
</html>
