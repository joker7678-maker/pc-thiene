<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PC THIENE - AREA PERSONALE</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="logosala.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-auth-compat.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #010409 !important; color: #e2e8f0 !important; overflow: hidden; }
        #app-container { display: none; height: 100%; width: 100%; flex-direction: column; }
        .tab-content { display: none; animation: fadeIn 0.3s ease-out; }
        #tab-tattico.active-tab { display: flex; }
        #tab-eventi.active-tab { display: block; }
        #tab-personale.active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #map { height: 100%; width: 100%; background: #242a34; }
    </style>
</head>
<body class="h-screen w-screen relative">

    <div id="loading-screen" class="absolute inset-0 z-[999999] bg-[#010409] flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
        <div class="text-blue-400 font-bold uppercase tracking-widest text-xs animate-pulse">Sincronizzazione...</div>
    </div>

    <div id="login-screen" class="absolute inset-0 z-[99999] bg-[#010409] hidden flex-col items-center justify-center p-6">
        <img src="logosala.png" class="h-24 w-auto mb-6 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]">
        <h1 class="text-xl font-black text-white uppercase tracking-widest mb-8">Area Personale</h1>
        <div class="w-full max-w-sm flex flex-col gap-4">
            <input type="email" id="login-email" class="bg-slate-800 border border-slate-600 rounded-xl p-3 text-white focus:border-blue-500 outline-none" placeholder="Email">
            <input type="password" id="login-password" class="bg-slate-800 border border-slate-600 rounded-xl p-3 text-white focus:border-blue-500 outline-none" placeholder="Password">
            <button id="btn-login" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl shadow-lg transition-all active:scale-95 uppercase text-sm">Accedi</button>
        </div>
    </div>

    <div id="app-container">
        <div id="tab-tattico" class="tab-content active-tab h-full w-full relative flex-col pb-20">
            <div id="map" class="flex-1 w-full"></div>
            <div id="blocco-emergenza" class="hidden absolute inset-0 z-[999] bg-slate-900/90 backdrop-blur-sm flex flex-col items-center justify-center p-6 text-center">
                <div class="text-6xl mb-4">🛡️</div>
                <h2 class="text-xl font-black text-white uppercase mb-2">Mappa Disattiva</h2>
                <p class="text-slate-400 text-xs uppercase">Area disponibile solo durante emergenze attive.</p>
            </div>
        </div>

        <div id="tab-eventi" class="tab-content hidden h-full w-full bg-[#010409] overflow-y-auto pb-28 p-4">
            <h2 class="text-lg font-black text-white uppercase mb-4 flex items-center gap-2"><span>📅</span> Calendario</h2>
            <div id="lista-eventi" class="flex flex-col gap-3"></div>
        </div>

        <div id="tab-personale" class="tab-content hidden h-full w-full bg-[#010409] overflow-y-auto pb-28 p-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-black text-white uppercase">Il Mio Profilo</h2>
                <button onclick="logout()" class="text-[10px] bg-red-900/30 text-red-400 px-3 py-1 rounded border border-red-800 uppercase font-bold">Esci</button>
            </div>
            
            <div class="bg-slate-800 p-4 rounded-2xl shadow-lg mb-4 border border-slate-700">
                <div id="prof-nome" class="text-lg font-black uppercase text-white">---</div>
                <div id="prof-matr" class="text-blue-400 text-xs font-mono font-bold mt-1">MATRICOLA: ---</div>
                <div id="prof-ruolo" class="text-slate-400 text-[10px] mt-2 border-t border-slate-700 pt-2 uppercase">RUOLO: ---</div>
            </div>

            <h2 class="text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">🎒 Dotazioni e Risorse</h2>
            <div id="lista-dotazioni" class="flex flex-col gap-2"></div>
        </div>

        <div class="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-700 flex justify-around items-end pb-6 pt-2 px-2 z-[99999]">
            <button onclick="switchTab('tab-tattico', this)" class="nav-btn text-emerald-400 flex flex-col items-center gap-1 w-1/3 transition-all scale-110">
                <span class="text-xl">🚨</span><span class="text-[9px] font-black uppercase">Tattico</span>
            </button>
            <button onclick="switchTab('tab-eventi', this)" class="nav-btn text-slate-500 flex flex-col items-center gap-1 w-1/3 transition-all">
                <span class="text-xl">📅</span><span class="text-[9px] font-black uppercase">Eventi</span>
            </button>
            <button onclick="switchTab('tab-personale', this)" class="nav-btn text-slate-500 flex flex-col items-center gap-1 w-1/3 transition-all">
                <span class="text-xl">🪪</span><span class="text-[9px] font-black uppercase">Profilo</span>
            </button>
        </div>
    </div>

    <script>
        let db, map, markerMe;
        const loader = document.getElementById('loading-screen');

        firebase.auth().onAuthStateChanged(user => {
            if (!user) {
                loader.classList.add('hidden');
                document.getElementById('login-screen').classList.replace('hidden', 'flex');
                document.getElementById('app-container').style.display = 'none';
            } else {
                db = firebase.database();
                caricaDati(user);
            }
        });

        document.getElementById('btn-login').onclick = () => {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-password').value;
            firebase.auth().signInWithEmailAndPassword(e, p).catch(err => Swal.fire('Errore', 'Credenziali errate', 'error'));
        };

        function caricaDati(user) {
            db.ref('impostazioni/rubrica_volontari').once('value').then(snap => {
                let v = null;
                snap.forEach(child => { if(child.val().email?.toLowerCase() === user.email.toLowerCase()) v = child.val(); });
                
                if (v && v.ruolo?.includes('ESTERNO')) {
                    firebase.auth().signOut();
                    Swal.fire('Accesso Negato', 'Usa il Terminale Squadre.', 'warning');
                    return;
                }

                document.getElementById('prof-nome').innerText = v ? v.nome : user.email.split('@')[0];
                document.getElementById('prof-matr').innerText = "MATRICOLA: " + (v ? v.matricola : 'N/D');
                document.getElementById('prof-ruolo').innerText = "RUOLO: " + (v ? v.ruolo : 'VOLONTARIO');
                
                window.currentUser = v ? v.nome : user.email;
                avviaApp();
            });
        }

        function avviaApp() {
            loader.classList.add('hidden');
            document.getElementById('login-screen').classList.replace('flex', 'hidden');
            document.getElementById('app-container').style.display = 'flex';

            // Mappa
            map = L.map('map', { zoomControl:false, attributionControl:false }).setView([45.707, 11.465], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            // Controllo Emergenza
            db.ref('impostazioni/emergenza_attiva').on('value', snap => {
                document.getElementById('blocco-emergenza').style.display = snap.val() === true ? 'none' : 'flex';
            });

            // Carica Eventi
            db.ref('eventi').on('value', snap => {
                const cont = document.getElementById('lista-eventi');
                let html = '';
                snap.forEach(child => {
                    const e = child.val();
                    html += `<div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                        <div class="text-sm font-bold text-white uppercase">${e.titolo}</div>
                        <div class="text-[10px] text-slate-400 mt-1">📍 ${e.luogo} | 🕒 ${e.data}</div>
                        <div class="flex gap-2 mt-4">
                            <button onclick="rispondi('${child.key}','PRESENTE')" class="flex-1 bg-emerald-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Presente</button>
                            <button onclick="rispondi('${child.key}','ASSENTE')" class="flex-1 bg-red-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Assente</button>
                        </div>
                    </div>`;
                });
                cont.innerHTML = html || '<div class="text-center text-slate-500 text-xs py-10">Nessun evento</div>';
            });

            // Carica Magazzino (da risorse_mezzi come in anagrafica.html)
            db.ref('impostazioni/risorse_mezzi').on('value', snap => {
                const cont = document.getElementById('lista-dotazioni');
                let html = '';
                snap.forEach(child => {
                    const m = child.val();
                    html += `<div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl border border-slate-700">
                        <div><div class="text-white font-bold text-xs uppercase">${m.nome}</div><div class="text-[9px] text-slate-500 uppercase">${m.gruppo}</div></div>
                        <div class="text-[9px] bg-blue-900/30 text-blue-400 px-2 py-1 rounded border border-blue-800 font-bold">DISPONIBILE</div>
                    </div>`;
                });
                cont.innerHTML = html || '<div class="text-center text-slate-500 text-xs py-4">Magazzino vuoto</div>';
            });
        }

        function rispondi(id, r) {
            db.ref(`eventi/${id}/risposte/${window.currentUser}`).set(r).then(() => Swal.fire({title:'Inviato!', icon:'success', timer:1000, showConfirmButton:false}));
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('text-emerald-400', 'text-blue-400', 'scale-110'); b.classList.add('text-slate-500'); });
            btn.classList.add(id === 'tab-tattico' ? 'text-emerald-400' : (id === 'tab-eventi' ? 'text-blue-400' : 'text-blue-400'), 'scale-110');
            if(id==='tab-tattico') setTimeout(()=>map.invalidateSize(), 200);
        }

        function logout() { firebase.auth().signOut().then(()=>location.reload()); }
    </script>
</body>
</html>
