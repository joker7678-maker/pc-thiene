<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PC THIENE - AREA PERSONALE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="logosala.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-auth-compat.js"></script>

    <script src="config.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #010409 !important; color: #e2e8f0 !important; overflow: hidden; }
        .swal2-container { z-index: 9999999 !important; }
        #map { height: 100%; width: 100%; background: #242a34; z-index: 10; }
        .mili-grid { background-image: linear-gradient(rgba(59,130,246,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.1) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 15; }
        
        #app-container { display: none; height: 100%; width: 100%; flex-direction: column; }
        .tab-content { display: none; animation: fadeIn 0.3s ease-out; }
        #tab-tattico.active-tab { display: flex; }
        #tab-eventi.active-tab { display: block; }
        #tab-personale.active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-status { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; border-bottom-width: 4px; height: 50px; font-weight: 700; text-transform: uppercase; font-size: 10px; cursor: pointer; }
        .btn-status span { font-size: 20px; margin-bottom: 2px; }
        .btn-status:active { transform: scale(0.95); }
        .btn-media { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; background: #1e293b; border: 1px solid #334155; height: 50px; cursor: pointer; }
        .btn-media:active { transform: scale(0.95); }
    </style>
</head>
<body class="h-screen w-screen relative selection:bg-blue-500/30">

    <div id="loading-screen" class="absolute inset-0 z-[999999] bg-[#010409] flex flex-col items-center justify-center transition-opacity">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
        <div class="text-blue-400 font-black tracking-widest uppercase animate-pulse">Sincronizzazione...</div>
    </div>

    <div id="login-screen" class="absolute inset-0 z-[99999] bg-[#010409] hidden flex-col items-center justify-center p-6">
        <img src="logosala.png" alt="Logo" class="h-28 w-auto mb-6 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]">
        <h1 class="text-2xl font-black text-white uppercase tracking-widest mb-8 text-center leading-tight">Area<br><span class="text-blue-500">Personale</span></h1>
        <div class="w-full max-w-sm flex flex-col gap-4">
            <div><label class="text-[10px] text-slate-400 font-bold uppercase ml-1">Email</label><input type="email" id="login-email" class="w-full bg-slate-800 border border-slate-600 rounded-xl p-3 text-white focus:border-blue-500 focus:outline-none" placeholder="nome@ceitimpianti.com"></div>
            <div><label class="text-[10px] text-slate-400 font-bold uppercase ml-1">Password</label><input type="password" id="login-password" class="w-full bg-slate-800 border border-slate-600 rounded-xl p-3 text-white focus:border-blue-500 focus:outline-none" placeholder="••••••"></div>
            <button onclick="eseguiLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black uppercase py-3 rounded-xl mt-4 shadow-lg transition-all active:scale-95">🔐 ACCEDI</button>
        </div>
    </div>

    <div id="app-container">
        
        <div id="tab-tattico" class="tab-content active-tab h-full w-full relative flex-col pb-20">
            <header class="px-3 py-2 bg-slate-900 border-b border-slate-700 flex justify-between items-center z-[100] shadow-lg">
                <div class="flex items-center gap-3">
                    <img src="logosala.png" alt="Logo" class="h-10 w-auto">
                    <div class="flex flex-col"><h1 class="text-sm font-black text-white uppercase">Operatore Singolo</h1><span id="tattico-nome" class="text-[10px] text-emerald-400 font-bold uppercase">...</span></div>
                </div>
            </header>

            <div class="flex-1 w-full relative z-0">
                <div id="map" class="absolute inset-0"></div>
                <div class="absolute inset-0 mili-grid"></div>
                <div class="absolute top-2 left-2 right-2 z-[1000]"><div id="target-banner"></div></div>
                <div class="absolute bottom-2 right-2 z-[1000] flex flex-col gap-2">
                    <button onclick="window.centraMappaSuGPS()" class="bg-slate-800/90 text-white h-12 w-12 rounded-xl border border-slate-600 shadow-lg text-2xl">📍</button>
                    <button onclick="window.toggleGPS()" id="btn-toggle-gps" class="bg-slate-800/90 text-slate-400 h-12 w-12 rounded-xl border border-slate-600 shadow-lg text-xl relative">📡<span id="gps-status-indicator" class="absolute top-1 right-1 w-2.5 h-2.5 bg-slate-500 rounded-full"></span></button>
                </div>
            </div>

            <div class="shrink-0 bg-slate-900 border-t border-slate-700 p-2 flex flex-col gap-2 z-[100] shadow-[0_-10px_15px_rgba(0,0,0,0.5)]">
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="window.askStatus('Sede', '🏠')" class="btn-status bg-emerald-600 border-emerald-800 text-white"><span>🏠</span> Sede</button>
                    <button onclick="window.askStatus('Uscita', '🚚')" class="btn-status bg-amber-500 border-amber-700 text-slate-900"><span>🚚</span> Uscita</button>
                    <button onclick="window.askStatus('Intervento', '🚨')" class="btn-status bg-red-600 border-red-800 text-white"><span>🚨</span> Sul Posto</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('file-foto').click()" class="flex-1 btn-media text-white"><span>📷</span><span class="text-[9px] font-bold">FOTO</span></button>
                    <input type="file" id="file-foto" accept="image/*" capture="camera" class="hidden" onchange="window.inviaFoto(this.files[0])">
                    
                    <div class="flex-1 flex gap-1">
                        <input type="text" id="msg-input" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-2 text-xs text-white focus:outline-none focus:border-blue-500" placeholder="Messaggio in Sala...">
                        <button onclick="window.askFreeMsg()" class="bg-blue-600 text-white px-3 rounded-lg font-black text-lg shadow-lg active:scale-95">➤</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-eventi" class="tab-content hidden h-full w-full bg-[#010409] overflow-y-auto pb-28 p-4">
            <div class="flex items-center gap-3 mb-6 mt-2">
                <span class="text-3xl">📅</span>
                <div><h2 class="text-xl font-black text-white uppercase">Eventi / Turni</h2><p class="text-[10px] text-blue-400 font-bold uppercase">Inserisci la tua disponibilità</p></div>
            </div>
            <div id="lista-eventi-app" class="flex flex-col gap-3"></div>
        </div>

        <div id="tab-personale" class="tab-content hidden h-full w-full bg-[#010409] overflow-y-auto pb-28 p-4">
            <div class="flex items-center justify-between mb-6 mt-2">
                <div class="flex items-center gap-3"><span class="text-3xl">🪪</span><h2 class="text-xl font-black text-white uppercase">Profilo</h2></div>
                <button onclick="esciDallApp()" class="bg-red-900/50 text-red-400 text-[9px] font-bold uppercase px-3 py-1.5 rounded-lg border border-red-800">Esci</button>
            </div>
            
            <div class="bg-slate-800/80 border border-slate-700 rounded-2xl p-5 mb-4 shadow-lg">
                <div id="profilo-nome" class="text-xl text-white font-black uppercase">...</div>
                <div id="profilo-matricola" class="text-sm text-blue-400 font-mono mt-1 font-bold">N/D</div>
            </div>

            <div class="bg-slate-800/80 border border-slate-700 rounded-2xl p-4 mb-4 shadow-lg">
                <div class="text-[10px] text-slate-400 uppercase font-bold mb-3 flex items-center gap-2"><span>🎒</span> LE MIE DOTAZIONI (D.P.I.)</div>
                <div id="lista-dotazioni" class="flex flex-col gap-2"></div>
            </div>

            <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-4 shadow-lg">
                <div class="text-[10px] text-slate-400 uppercase font-bold mb-2 flex items-center gap-2"><span>📝</span> APPUNTI PERSONALI</div>
                <textarea id="diario-personale" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-slate-300 focus:outline-none min-h-[100px]" placeholder="Note salvate localmente sul tuo telefono..."></textarea>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 w-full bg-slate-900/95 border-t border-slate-700 flex justify-around items-end pb-6 pt-3 px-2 z-[99999] shadow-2xl">
            <button onclick="window.switchAppTab('tab-tattico', this)" class="nav-btn active flex flex-col items-center gap-1 w-1/3 text-emerald-400 transition-all duration-300 transform scale-110">
                <span class="text-2xl icon-nav transition-all">🚨</span><span class="text-[10px] font-black uppercase">Tattico</span>
            </button>
            <button onclick="window.switchAppTab('tab-eventi', this)" class="nav-btn flex flex-col items-center gap-1 w-1/3 text-slate-500 hover:text-blue-400 transition-all duration-300">
                <span class="text-2xl opacity-70 icon-nav transition-all">📅</span><span class="text-[10px] font-bold uppercase">Eventi</span>
            </button>
            <button onclick="window.switchAppTab('tab-personale', this)" class="nav-btn flex flex-col items-center gap-1 w-1/3 text-slate-500 hover:text-purple-400 transition-all duration-300">
                <span class="text-2xl opacity-70 icon-nav transition-all">🪪</span><span class="text-[10px] font-bold uppercase">Profilo</span>
            </button>
        </div>
    </div>

    <script>
        let db, map, markerMe, isGpsActive = false, gpsTrackerId = null;
        window.currentUser = '';

        // INIZIALIZZAZIONE FIREBASE
        const controllaFirebase = setInterval(() => {
            if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
                clearInterval(controllaFirebase); db = firebase.database(); 
                
                firebase.auth().onAuthStateChanged(user => {
                    const loader = document.getElementById('loading-screen');
                    const loginUI = document.getElementById('login-screen');
                    
                    if (!user) {
                        loader.classList.add('hidden');
                        loginUI.classList.remove('hidden'); loginUI.classList.add('flex');
                        document.getElementById('app-container').style.display = 'none';
                    } else {
                        loginUI.classList.add('hidden'); loginUI.classList.remove('flex');
                        
                        // Cerca utente nella rubrica
                        db.ref('impostazioni/rubrica_volontari').once('value').then(snap => {
                            let trovato = null;
                            if(snap.exists()) {
                                snap.forEach(child => {
                                    if (child.val().email && child.val().email.toLowerCase().trim() === user.email.toLowerCase().trim()) {
                                        trovato = child.val();
                                    }
                                });
                            }
                            
                            // Espelle gli Esterni
                            if (trovato && trovato.ruolo && String(trovato.ruolo).toUpperCase().includes('ESTERNO')) {
                                firebase.auth().signOut();
                                Swal.fire('ACCESSO NEGATO', 'Questa app è riservata ai volontari interni di Thiene. Usa il Terminale Squadra sui mezzi.', 'error');
                                return;
                            }

                            // Imposta Dati Utente Corrente
                            window.currentUser = trovato ? trovato.nome.toUpperCase() : user.email.split('@')[0].toUpperCase();
                            document.getElementById('profilo-nome').innerText = window.currentUser;
                            document.getElementById('tattico-nome').innerText = "OP: " + window.currentUser;
                            document.getElementById('profilo-matricola').innerText = "MATRICOLA: " + (trovato ? trovato.matricola : 'N/D');
                            
                            avviaInterfaccia();
                        });
                    }
                });
            }
        }, 100);

        function eseguiLogin() {
            const e = document.getElementById('login-email').value; const p = document.getElementById('login-password').value;
            if (!e || !p) { Swal.fire('Attenzione', 'Inserisci email e password', 'warning'); return; }
            Swal.fire({ title: 'Accesso...', didOpen: () => Swal.showLoading() });
            firebase.auth().signInWithEmailAndPassword(e, p).then(()=>Swal.close()).catch(err => Swal.fire('Errore', 'Credenziali errate', 'error'));
        }

        function esciDallApp() {
            Swal.fire({title: 'Disconnetti?', icon: 'warning', showCancelButton: true, confirmButtonText: 'SÌ, ESCI'}).then(r => {
                if(r.isConfirmed) firebase.auth().signOut().then(() => location.reload());
            });
        }

        function avviaInterfaccia() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('app-container').style.display = 'flex';

            // Mappa (Se non esiste la crea)
            if (!document.getElementById('map').innerHTML) {
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([45.707, 11.465], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            }

            // ==========================================
            // EVENTI E TURNI (Ora Con Conferma)
            // ==========================================
            db.ref('eventi').on('value', snap => {
                const contenitore = document.getElementById('lista-eventi-app');
                if (snap.exists()) {
                    let html = '';
                    snap.forEach(child => {
                        const e = child.val();
                        html += `
                        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 shadow-lg mb-3">
                            <h3 class="text-sm font-bold text-white uppercase">${e.titolo || 'Evento'}</h3>
                            <div class="text-[10px] text-slate-400 mt-1 mb-3">📍 ${e.luogo || 'Sede'} | 🕒 ${e.data || 'N/D'}</div>
                            <div class="flex gap-2">
                                <button onclick="window.rispondiEvento('${child.key}', 'PRESENTE')" class="flex-1 bg-slate-900 border border-emerald-500/30 text-emerald-400 py-2 rounded-xl text-[10px] font-bold uppercase shadow-md active:scale-95">✅ Presente</button>
                                <button onclick="window.rispondiEvento('${child.key}', 'ASSENTE')" class="flex-1 bg-slate-900 border border-red-500/30 text-red-400 py-2 rounded-xl text-[10px] font-bold uppercase shadow-md active:scale-95">❌ Assente</button>
                            </div>
                        </div>`;
                    });
                    contenitore.innerHTML = html;
                } else {
                    contenitore.innerHTML = '<p class="text-center text-slate-500 text-xs py-10 uppercase font-bold tracking-widest">Nessun Evento in Lista</p>';
                }
            });

            // ==========================================
            // DOTAZIONI E D.P.I. (Filtra le tue)
            // ==========================================
            db.ref('dotazioni').on('value', snap => {
                const contenitore = document.getElementById('lista-dotazioni');
                if (snap.exists()) {
                    let html = '';
                    let trovatoQualcosa = false;
                    
                    snap.forEach(child => {
                        const dot = child.val();
                        // MOSTRA SOLO SE ASSEGNATO A TE (Ignora maiuscole/minuscole)
                        if (dot.assegnato_a && dot.assegnato_a.toUpperCase() === window.currentUser.toUpperCase()) {
                            trovatoQualcosa = true;
                            html += `
                            <div class="flex justify-between items-center bg-slate-900 border border-slate-700 p-3 rounded-xl mb-1">
                                <div class="flex flex-col"><span class="text-white font-bold text-[11px] uppercase">${dot.articolo || dot.nome || 'Materiale'}</span><span class="text-slate-400 text-[9px] uppercase">${dot.categoria || 'DPI'} ${dot.taglia ? '| Tg: '+dot.taglia : ''}</span></div>
                                <div class="bg-blue-900/40 text-blue-300 border border-blue-700/50 px-2 py-1 rounded text-[10px] font-black">Q.tà: ${dot.quantita || dot.qta || 1}</div>
                            </div>`;
                        }
                    });
                    
                    contenitore.innerHTML = trovatoQualcosa ? html : '<p class="text-slate-500 text-xs text-center py-4 uppercase font-bold">Nessuna Dotazione Personale Trovata.</p>';
                } else { 
                    contenitore.innerHTML = '<p class="text-slate-500 text-xs text-center py-4 uppercase font-bold">Database Dotazioni Vuoto.</p>'; 
                }
            });

            // Diario locale
            const diario = document.getElementById('diario-personale');
            diario.value = localStorage.getItem('diario_vol') || '';
            diario.addEventListener('input', (e) => localStorage.setItem('diario_vol', e.target.value));
        }

        // ==========================================
        // FUNZIONI SICUREZZA E CONFERMA
        // ==========================================

        window.rispondiEvento = (id, risposta) => {
            Swal.fire({ 
                title: 'Confermi?', 
                text: `Vuoi segnarti come ${risposta}?`, 
                icon: 'question', 
                showCancelButton: true, 
                confirmButtonText: 'SÌ, CONFERMA',
                confirmButtonColor: risposta === 'PRESENTE' ? '#10b981' : '#ef4444',
                background: '#0f172a', color: '#fff'
            }).then((res) => {
                if(res.isConfirmed) {
                    db.ref(`eventi/${id}/risposte/${window.currentUser}`).set(risposta)
                      .then(() => Swal.fire({title:'Salvato!', icon:'success', timer:1500, showConfirmButton:false, background: '#0f172a', color: '#fff'}));
                }
            });
        };

        window.askStatus = (stato, icon) => {
            Swal.fire({
                title: `CONFERMI STATO?`,
                html: `<span class="text-4xl block mb-2">${icon}</span><b>${stato.toUpperCase()}</b>`,
                showCancelButton: true, confirmButtonText: 'INVIA', confirmButtonColor: '#2563eb', background: '#0f172a', color: '#fff'
            }).then((r) => {
                if(r.isConfirmed) {
                    // Aggiorna la squadra col nome dell'operatore
                    db.ref(`anagrafica_squadre/${window.currentUser}`).update({ stato: stato, capo: window.currentUser, ultimo_contatto: Date.now() });
                    inviaMessaggioBrogliaccio(`CAMBIO STATO: ${stato}`, { dir: 'SQ', stato: 'OK' });
                }
            });
        };

        window.askFreeMsg = () => {
            const txt = document.getElementById('msg-input').value.trim();
            if(!txt) return;
            Swal.fire({
                title: 'INVIARE MESSAGGIO?',
                text: `"${txt}"`,
                showCancelButton: true, confirmButtonText: 'INVIA', confirmButtonColor: '#2563eb', background: '#0f172a', color: '#fff'
            }).then(r => {
                if(r.isConfirmed) {
                    inviaMessaggioBrogliaccio(txt, { dir: 'SQ', stato: 'OK' });
                    document.getElementById('msg-input').value = '';
                }
            });
        };

        window.inviaFoto = (file) => {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                Swal.fire({
                    title: 'INVIARE FOTO?', html: `<img src="${e.target.result}" class="w-full rounded mt-2">`,
                    showCancelButton: true, confirmButtonText: 'INVIA FOTO', confirmButtonColor: '#2563eb', background: '#0f172a', color: '#fff'
                }).then((r) => {
                    if(r.isConfirmed) inviaMessaggioBrogliaccio("📷 FOTO INVIATA", { mediaUrl: e.target.result, mediaType: 'IMG', dir: 'SQ', stato: 'OK' });
                });
            };
            reader.readAsDataURL(file);
        };

        function inviaMessaggioBrogliaccio(testo, extraObj) {
            const ora = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            db.ref('brogliaccio').push({
                ora: ora, data: new Date().toLocaleDateString('it-IT'),
                squadra: window.currentUser, utente: window.currentUser,
                m1: testo.toUpperCase(),
                ...extraObj
            }).then(() => Swal.fire({ title: 'Inviato in Sala!', icon: 'success', timer: 1000, showConfirmButton: false, background: '#0f172a', color: '#fff' }));
        }

        // ==========================================
        // GESTIONE TABS E GPS
        // ==========================================
        window.switchAppTab = (tabId, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active-tab');
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('text-emerald-400', 'text-blue-400', 'text-purple-400', 'scale-110'); b.classList.add('text-slate-500'); });
            btn.classList.add('scale-110');
            if(tabId === 'tab-tattico') { btn.classList.add('text-emerald-400'); if(map) setTimeout(() => map.invalidateSize(), 200); } 
            else if(tabId === 'tab-eventi') btn.classList.add('text-blue-400'); 
            else if(tabId === 'tab-personale') btn.classList.add('text-purple-400');
        };

        window.toggleGPS = () => {
            const btn = document.getElementById('btn-toggle-gps'); const ind = document.getElementById('gps-status-indicator');
            if (isGpsActive) {
                if(gpsTrackerId) navigator.geolocation.clearWatch(gpsTrackerId); gpsTrackerId = null; isGpsActive = false;
                btn.classList.remove('border-emerald-500'); ind.className = 'absolute top-1 right-1 w-2.5 h-2.5 bg-slate-500 rounded-full';
            } else { 
                if (!navigator.geolocation) return; isGpsActive = true; 
                btn.classList.add('border-emerald-500'); ind.className = 'absolute top-1 right-1 w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse';
                gpsTrackerId = navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude } = pos.coords;
                    if (!markerMe) { markerMe = L.marker([latitude, longitude]).addTo(map); map.setView([latitude, longitude], 16); } 
                    else { markerMe.setLatLng([latitude, longitude]); }
                    // Aggiorna la posizione in sala radio a nome del volontario
                    db.ref(`anagrafica_squadre/${window.currentUser}`).update({ lat: latitude.toFixed(6), lng: longitude.toFixed(6), ultimo_contatto: Date.now() });
                }, null, { enableHighAccuracy: true });
            }
        };
        window.centraMappaSuGPS = () => { if(markerMe) map.setView(markerMe.getLatLng(), 17); };

    </script>
</body>
</html>
