window.applicaFiltroDOM = () => {
    const righe = document.querySelectorAll('#log-body tr');
    
    righe.forEach(riga => {
        if (riga.cells.length < 4) return; // Salta righe anomale
        
        const cellaSquadra = riga.cells[1].innerText.toUpperCase();
        const cellaTesto = riga.cells[3].innerText.toUpperCase();
        
        let mostra = true; // Di base mostra tutto

        if (window.filtroBrogliaccio.tipo === 'SQUADRA') {
            mostra = cellaSquadra.includes(window.filtroBrogliaccio.valore);
        } else if (window.filtroBrogliaccio.tipo === 'INTERVENTO') {
            // Cerca la stringa esatta dell'intervento nel testo

window.playRadioChirp = () => {
    // 1. Non suona se mutato o se il sistema si sta ancora avviando
    if (!window.suonoRadioAttivo || !window.sistemaAvviato) return;
    
    // 2. Anti-Spam: non suona più di 1 volta ogni secondo (evita accavallamenti)
    const ora = Date.now();
    if (ora - window.ultimoSuonoTempo < 1000) return;
    window.ultimoSuonoTempo = ora;

    // 3. Sintetizzatore Digitale (Nessun MP3 esterno richiesto!)
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        const creaBip = (freq, start, durata) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine'; // Suono pulito
            osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
            
            // Volume basso e sfumato per non dare fastidio
            gain.gain.setValueAtTime(0.1, ctx.currentTime + start); 
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + durata);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(ctx.currentTime + start);
            osc.stop(ctx.currentTime + start + durata);
        };

        // Classico doppio suono: Bip... Bip acuto
        creaBip(1500, 0, 0.1);      
        creaBip(1900, 0.12, 0.15);  
        
    } catch (e) { console.log("Audio disabilitato dal browser"); }
};

window.importaBackup = () => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'application/json';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.readAsText(file, 'UTF-8');
        reader.onload = evt => {
            try {
                const content = JSON.parse(evt.target.result);
                if(content.ana && content.logs) {
                    Swal.fire({
                        title: 'RIPRISTINO TATTICO', 
                        text: "Questa operazione sovrascriverà la Sala e il server Cloud con i dati del backup. Procedere?", 
                        icon: 'warning', 
                        showCancelButton: true, 
                        confirmButtonColor: '#dc2626', 
                        confirmButtonText: 'SÌ, RIPRISTINA TUTTO', 
                        cancelButtonText: 'ANNULLA',
                        background: '#0f172a',
                        color: '#fff'
                    }).then(async (res) => {
                        if (res.isConfirmed) {
                            Swal.fire({ title: 'Ripristino Memoria Locale...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                            
                            // 1. Svuota solo i dati operativi locali
                            await ParallelDB.clearAll(); 
                            
                            // 2. SALVATAGGIO LOCALE INFALLIBILE (Salva sempre su PC, anche offline)
                            if(content.ana) { for(let k in content.ana) await ParallelDB.save('squadre', content.ana[k], false); }
                            if(content.logs) { for(let k in content.logs) await ParallelDB.save('brogliaccio', content.logs[k], false); }
                            if(content.interventi) { for(let k in content.interventi) await ParallelDB.save('interventi', content.interventi[k], false); }
                            
                            // 3. SINCRONIZZAZIONE CLOUD CON "SGANCIO RAPIDO" (MAX 3 SECONDI)
                            if (typeof db !== 'undefined') {
                                Swal.getTitle().innerText = "Sincronizzazione Cloud...";
                                try {
                                    // Promise.race fa "gareggiare" il salvataggio Firebase contro un timer di 3 secondi
                                    await Promise.race([
                                        Promise.all([
                                            content.ana ? db.ref('anagrafica_squadre').set(content.ana) : Promise.resolve(),
                                            content.logs ? db.ref('brogliaccio').set(content.logs) : Promise.resolve(),
                                            content.interventi ? db.ref('interventi').set(content.interventi) : Promise.resolve(),
                                            content.cestino ? db.ref('cestino').set(content.cestino) : Promise.resolve()
                                        ]),
                                        new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 3000))
                                    ]);
                                } catch(e) {
                                    console.warn("Rete assente o lenta: Firebase sincronizzerà in background appena tornerà il segnale.");
                                }
                            }
                            
                            // 4. Ripristina Cestino e Tracce GPS
                            if(content.cestino) { window.cestino = content.cestino; localStorage.setItem('cestino_locale', JSON.stringify(window.cestino)); }
                            if(content.tracce) { window.teamPaths = content.tracce; localStorage.setItem('pc_gps_tracks', JSON.stringify(window.teamPaths)); }
                            
                            Swal.fire({icon: 'success', title: 'Completato', text: 'Il sistema si riavvierà ora.', background: '#0f172a', color: '#fff'})
                                .then(() => location.reload());
                        }
                    });
                } else { Swal.fire({icon: 'error', title: 'Errore', text: 'File di backup non compatibile.', background: '#0f172a', color: '#fff'}); }
            } catch(err) { Swal.fire({icon: 'error', title: 'Errore', text: 'File corrotto o non valido.', background: '#0f172a', color: '#fff'}); }
        }
    };
    input.click();
};

        background: '#0f172a', color: '#fff', showCancelButton: true, confirmButtonText: 'SBLOCCA', cancelButtonText: 'Annulla', confirmButtonColor: '#dc2626',
        customClass: { input: '!text-center !tracking-widest !font-mono !bg-[#020617] !border-slate-600 focus:!border-red-500' }
    });

    if (!passInserita) { window.apriDatabase(); return; } // Annullato

    const masterPass = window.APP_CONFIG?.passwordAccesso || ""; 
    if (passInserita !== masterPass && masterPass !== "") {
        Swal.fire({icon: 'error', title: 'ACCESSO NEGATO', text: 'Password errata.', background: '#0f172a', color: '#fff'}).then(() => window.apriDatabase());
        return;
    }

    // 🔓 2. EDITOR
    let testoAttuale = `L'Operatore al terminale è formalmente designato come "Incaricato al Trattamento Dati"...`;
    if (typeof db !== 'undefined' && navigator.onLine) {
        try {
            Swal.fire({ title: 'Caricamento...', background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading() });
            const snap = await db.ref('configurazione/testo_gdpr').once('value');
            if (snap.val()) testoAttuale = snap.val();
        } catch(e) { }
    }

    const { value: nuovoTesto } = await Swal.fire({
        title: '✏️ EDITOR GDPR (LIVELLO ADMIN)',
        html: '<div class="text-[10px] text-emerald-400 font-bold mb-2 text-left uppercase tracking-widest border-b border-slate-700 pb-1">Sincronizzazione globale per tutti i terminali.</div>',
        input: 'textarea', inputValue: testoAttuale,
        width: '800px', background: '#0f172a', color: '#fff',
        showCancelButton: true, confirmButtonText: '💾 SALVA E PUBBLICA', cancelButtonText: 'Annulla', confirmButtonColor: '#10b981',
        customClass: { input: '!h-72 !text-xs !font-sans !bg-slate-900 !text-white !border-slate-600 !p-4 !leading-relaxed shadow-inner' }
    });

    if (nuovoTesto) {
        if (typeof db !== 'undefined') {
            await db.ref('configurazione/testo_gdpr').set(nuovoTesto);
            Swal.fire({icon: 'success', title: 'Pubblicato!', background: '#0f172a', color: '#fff', timer: 2000, showConfirmButton: false})
                .then(() => window.apriDatabase()); // Riapre
        }
    } else {
        window.apriDatabase(); // Riapre se annulli
    }
};

window.aggiungiMappaOffline = async () => {
    const nome = document.getElementById('new-folder-mappa').value.trim().toLowerCase();
    if (!nome) return;

    // ... (Mantieni intatta la parte del controllo Password Master) ...

    // FIX: Ora l'array di base è davvero vuoto []
    let attuali = JSON.parse(localStorage.getItem('lista_mappe_offline')) || [];
    if (!attuali.includes(nome)) {
        attuali.push(nome);
        localStorage.setItem('lista_mappe_offline', JSON.stringify(attuali));
        
        // AUTO-ATTIVAZIONE: Se è la prima mappa che carichi, la imposta subito come attiva!
        if (attuali.length === 1) {
            localStorage.setItem('mappa_attiva', nome);
        }
        
        Swal.fire({icon: 'success', title: 'Mappa Salvata!', text: 'Il sistema si riavvierà.', background: '#1e293b', color: '#fff', timer: 1500, showConfirmButton: false})
            .then(() => location.reload());
    }
};

window.rimuoviMappaOffline = async (nome) => {
    // --- PROTEZIONE PASSWORD MASTER (Design Pulito) ---
    const { value: passInserita } = await Swal.fire({
        title: '<div class="text-amber-500 tracking-widest uppercase font-bold text-lg">🔒 ACCESSO MASTER</div>',
        html: `<div class="text-[12px] text-slate-300 mb-2">Inserisci la password di sistema per eliminare la mappa <b class="text-white">${nome.toUpperCase()}</b>.</div>`,
        input: 'password',
        inputPlaceholder: 'Password...',
        background: '#1e293b', color: '#f8fafc', showCancelButton: true,
        confirmButtonText: 'SBLOCCA E ELIMINA', cancelButtonText: 'Annulla', confirmButtonColor: '#dc2626',
        customClass: { input: '!text-center !tracking-widest !font-mono !bg-[#0f172a] !border-slate-500 !text-white focus:!border-red-400' }
    });

    if (!passInserita) return;
    const masterPass = window.APP_CONFIG?.passwordAccesso || ""; 
    if (passInserita !== masterPass && masterPass !== "") {
        return Swal.fire({icon: 'error', title: 'ACCESSO NEGATO', text: 'Password Master errata.', background: '#1e293b', color: '#fff'});
    }
    // --- FINE PROTEZIONE ---

    let attuali = JSON.parse(localStorage.getItem('lista_mappe_offline')) || [];
    attuali = attuali.filter(m => m !== nome);
    localStorage.setItem('lista_mappe_offline', JSON.stringify(attuali));
    
    Swal.fire({icon: 'success', title: 'Mappa Eliminata', background: '#1e293b', color: '#fff', timer: 1500, showConfirmButton: false})
        .then(() => location.reload());
};

window.testConnessione = async (btn) => {
    const originalHtml = btn.innerHTML;
    btn.innerHTML = '<span class="text-sm animate-spin">⏳</span> PING...';
    const start = performance.now();
    try {
        await fetch('https://1.1.1.1/cdn-cgi/trace', { mode: 'no-cors', cache: 'no-cache' });
        const ms = Math.round(performance.now() - start);
        let color = ms < 100 ? '#10b981' : (ms < 300 ? '#f59e0b' : '#dc2626');
        btn.innerHTML = `<span class="text-sm">📡</span> <span style="color:${color}">${ms}ms</span>`;
        setTimeout(() => { btn.innerHTML = originalHtml; }, 4000);
    } catch(e) {
        btn.innerHTML = `<span class="text-sm">❌</span> OFFLINE`;
        setTimeout(() => { btn.innerHTML = originalHtml; }, 4000);
    }
};

window.clearAllGPSTracks = async (btn) => {
    if (confirm("🗑️ Vuoi davvero cancellare tutte le scie GPS dalla mappa?")) {
        if(window.map) {
            Object.values(window.mapLines || {}).forEach(line => window.map.removeLayer(line));
            Object.values(window.mapArrows || {}).forEach(group => window.map.removeLayer(group));
        }
        window.mapLines = {}; window.mapArrows = {}; window.teamPaths = {};
        localStorage.removeItem('pc_gps_tracks');
        
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<span class="text-sm">✅</span> PULITA';
        btn.classList.add('!text-emerald-400', '!border-emerald-500');
        setTimeout(() => { 
            btn.innerHTML = originalHtml; 
            btn.classList.remove('!text-emerald-400', '!border-emerald-500');
        }, 3000);
    }
};
